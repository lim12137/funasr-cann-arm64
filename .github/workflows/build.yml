name: Build FunASR CANN ARM64 Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        required: false
        default: "8.0-rc1"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".github/workflows/build.yml"

jobs:
  build:
    # GitHub 托管 x86 runner，通过 QEMU 模拟 arm64 构建（不需要 NPU）
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-fs24haezdztsodhc.cn-guangzhou.personal.cr.aliyuncs.com
          username: 1580875610333943
          password: ${{ secrets.ALIYUN_ACR_PWD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/funasr-cann:${{ github.event.inputs.tag || '8.0-rc1' }}
            crpi-fs24haezdztsodhc.cn-guangzhou.personal.cr.aliyuncs.com/hopemyl/funasr:${{ github.event.inputs.tag || '8.0-rc1' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
