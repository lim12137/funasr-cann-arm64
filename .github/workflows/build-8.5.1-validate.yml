name: Build FunASR CANN 8.5.1 Validation Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag"
        required: false
        default: "8.5.1-validate"
  push:
    branches: [main]
    paths:
      - "Dockerfile.8.5.1-validate"
      - "requirements-8.5.1-validate.txt"
      - "verify/**"
      - ".github/workflows/build-8.5.1-validate.yml"

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write
    env:
      CANN_BASE: ascendai/cann:8.5.1-910b-ubuntu22.04-py3.11

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify CANN base image supports ARM64
        run: |
          docker buildx imagetools inspect "$CANN_BASE" --format '{{json .Manifest}}' | tee /tmp/cann-manifest.json
          grep -q '"architecture":"arm64"' /tmp/cann-manifest.json

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-fs24haezdztsodhc.cn-guangzhou.personal.cr.aliyuncs.com
          username: hopemyl
          password: ${{ secrets.ALIYUN_ACR_PWD }}

      - name: Build and push validation image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.8.5.1-validate
          platforms: linux/arm64
          build-args: |
            CANN_BASE=${{ env.CANN_BASE }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/funasr-cann:${{ github.event.inputs.tag || '8.5.1-validate' }}
            crpi-fs24haezdztsodhc.cn-guangzhou.personal.cr.aliyuncs.com/hopemyl/funasr:${{ github.event.inputs.tag || '8.5.1-validate' }}
          cache-from: type=gha,scope=funasr-8.5.1-validate
          cache-to: type=gha,mode=max,scope=funasr-8.5.1-validate
